<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GartenDoc – Pflanzen erkennen & Gesundheit prüfen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>🌿 GartenDoc</h1>
      <p class="subtitle">
        Foto auswählen oder direkt aufnehmen und eine Analyse zu Art, Zustand,
        Krankheiten, Schädlingen, Wasserbedarf und Maßnahmen erhalten.
      </p>

      <section class="card">
        <h2>1) OpenAI API-Key</h2>
        <label for="apiKey">API-Key (nur lokal im Browser gespeichert):</label>
        <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
      </section>

      <section class="card">
        <h2>2) Foto wählen oder aufnehmen</h2>
        <div class="input-row">
          <label class="btn">
            📁 Aus Fotoalbum wählen
            <input id="galleryInput" type="file" accept="image/*" />
          </label>

          <label class="btn">
            📷 Direkt Foto machen
            <input id="cameraInput" type="file" accept="image/*" capture="environment" />
          </label>
        </div>

        <img id="preview" alt="Vorschau der Pflanze" class="preview hidden" />
      </section>

      <section class="card">
        <h2>3) Analyse starten</h2>
        <button id="analyzeBtn" class="btn primary">🔎 Pflanze analysieren</button>
        <p id="status" class="status">Bereit.</p>
      </section>

      <section class="card">
        <h2>Ergebnis</h2>
        <pre id="result" class="result">Noch keine Analyse vorhanden.</pre>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
